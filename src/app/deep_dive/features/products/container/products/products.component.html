<div class="products-list">
  @for (productCategory of store.productsByCategories(); track productCategory.category) {
    <app-product-category
      (cartClicked)="store.addToCart($event)"
      (clicked)="store.onProductClicked($event)"
      [categoryName]="productCategory.category | categoryName"
      [products]="productCategory.products"
    />
  }
</div>
