<a class="back-link" routerLink="products">Back</a>
@if (store.productDetail(); as product) {
  <div class="detail-container">
    <app-product-image [imageUrl]="product.imageUrl" />

    <app-product-info
      [product]="product"
      (addToCartClicked)="store.addToCart($event)"
    />
  </div>
}
