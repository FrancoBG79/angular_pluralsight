<div class="create-course-panel">
  <div class="create-course-hero">
    <div class="create-course-icon">
      <create-course-hero-icon />
    </div>
    <div>
      <h2 class="create-course-headline">Create New Course</h2>
      <p class="create-course-sub">Fill in each step to publish your course</p>
    </div>
  </div>

  <div class="card stepper-card">
    <div class="stepper-header">
      @let step = currentStep();
      @for (s of steps; track $index) {
        @if (!$first) {
          <div class="step-connector"></div>
        }
        <div class="step-indicator">
          <div class="step-circle" [class.active]="step === $index" [class.done]="step > $index">{{ $index + 1 }}</div>
          <span class="step-label" [class.active]="step === $index">{{ s.label }}</span>
        </div>
      }
    </div>

    <div class="step-content">
      <div [class.hidden]="currentStep() !== 0">
        <create-course-step-1 #step1 />
        <div class="stepper-buttons">
          <button class="btn btn-primary" (click)="currentStep.set(1)">
            Continue
            <arrow-right-icon />
          </button>
        </div>
      </div>

      <div [class.hidden]="currentStep() !== 1">
        <create-course-step-2 #step2 />
        <div class="stepper-buttons">
          <button class="btn btn-ghost" (click)="currentStep.set(0)">
            <arrow-left-icon />
            Back
          </button>
          <button class="btn btn-primary" (click)="currentStep.set(2)">
            Continue
            <arrow-right-icon />
          </button>
        </div>
      </div>

      <div [class.hidden]="currentStep() !== 2">
        <create-course-step-3 #step3 />
        <div class="stepper-buttons">
          <button class="btn btn-ghost" (click)="currentStep.set(1)">
            <arrow-left-icon />
            Back
          </button>
          <button class="btn btn-primary"
            [disabled]="step3.step3Model().lessons.length === 0"
            (click)="submit(step1.step1Model(), step2.step2Model(), step3.step3Model())">
            <check-icon />
            Create Course
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
